name: CourtVision
options:
  bundleIdPrefix: ai.courtvision
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": false
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  CourtVision:
    type: application
    platform: iOS
    sources:
      - path: CourtVision
    info:
      path: CourtVision/Info.plist
      properties:
        CFBundleDisplayName: CourtVision AI
        CourtVisionAPIBaseURL: $(COURTVISION_API_URL)
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.courtvision.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COURTVISION_API_URL: ""
        GENERATE_INFOPLIST_FILE: false
    scheme:
      testTargets:
        - CourtVisionTests
  CourtVisionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CourtVisionTests
    dependencies:
      - target: CourtVision
    settings:
      base:
        CODE_SIGNING_ALLOWED: false
        PRODUCT_BUNDLE_IDENTIFIER: ai.courtvision.tests
        GENERATE_INFOPLIST_FILE: true
