services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: courtvision
      POSTGRES_USER: courtvision
      POSTGRES_PASSWORD: courtvision
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courtvision"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      COURTVISION_DATABASE_URL: postgresql+asyncpg://courtvision:courtvision@postgres:5432/courtvision
      COURTVISION_REDIS_URL: redis://redis:6379/0
      COURTVISION_CORS_ORIGINS: http://localhost:3000
      COURTVISION_INTERNAL_API_KEY: local-development-key
    ports:
      - "8000:8000"
    command:
      - sh
      - -c
      - alembic upgrade head && python -m courtvision.seed && uvicorn courtvision.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      COURTVISION_INTERNAL_API_URL: http://api:8000
      COURTVISION_INTERNAL_API_KEY: local-development-key
    ports:
      - "3000:3000"
    depends_on:
      - api


volumes:
  postgres-data:
