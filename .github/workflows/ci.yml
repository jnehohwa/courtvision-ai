name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv sync --all-packages --all-extras
      - run: uv run ruff check apps/api ml tools
      - run: uv run pytest
      - run: uv run python tools/check_deployment_readiness.py
      - run: uv run python -m courtvision.export_openapi
      - run: git diff --exit-code contracts/openapi.json

  redis-integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 1s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv sync --all-packages --all-extras
      - run: uv run pytest apps/api/tests/test_worker_redis_integration.py -q
        env:
          COURTVISION_REDIS_INTEGRATION: "1"
          COURTVISION_REDIS_URL: redis://127.0.0.1:6379/0

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @courtvision/web lint
      - run: pnpm --filter @courtvision/web test
      - run: pnpm --filter @courtvision/web generate:contracts:file
      - run: git diff --exit-code apps/web/src/generated/openapi.ts apps/web/src/generated/websocket-envelope.ts
      - run: pnpm --filter @courtvision/web build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv sync --all-packages --all-extras
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @courtvision/web exec playwright install --with-deps chromium
      - run: pnpm --filter @courtvision/web test:e2e
        env:
          COURTVISION_E2E_FULL_STACK: "1"
          COURTVISION_E2E_API_COMMAND: "uv run python -m courtvision.e2e_server"
          PLAYWRIGHT_BROWSER: chromium

  e2e-redis:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 1s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv sync --all-packages --all-extras
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @courtvision/web exec playwright install --with-deps chromium
      - run: pnpm --filter @courtvision/web test:e2e
        env:
          COURTVISION_E2E_FULL_STACK: "1"
          COURTVISION_E2E_API_COMMAND: "uv run python -m courtvision.e2e_server"
          COURTVISION_E2E_REDIS_URL: redis://127.0.0.1:6379/1
          COURTVISION_E2E_RUN_WORKER: "1"
          PLAYWRIGHT_BROWSER: chromium

  ios:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
      - name: Check iOS WebSocket contract
        run: python3 tools/check_ios_websocket_contract.py
      - name: Check iOS REST contract
        run: python3 tools/check_ios_rest_contract.py
      - name: Create iOS simulator
        id: ios-simulator
        run: |
          simulator_udid="$(xcrun simctl create \
            "CourtVision CI iPhone 17" \
            "com.apple.CoreSimulator.SimDeviceType.iPhone-17" \
            "com.apple.CoreSimulator.SimRuntime.iOS-26-5")"
          echo "udid=$simulator_udid" >> "$GITHUB_OUTPUT"
      - name: Run iOS simulator tests
        run: |
          xcodebuild test \
            -project apps/ios/CourtVision.xcodeproj \
            -scheme CourtVision \
            -destination "platform=iOS Simulator,id=${{ steps.ios-simulator.outputs.udid }}" \
            -destination-timeout 120 \
            -derivedDataPath "$RUNNER_TEMP/courtvision-derived-data" \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO
